name: Scrape Ship Data

on:
  schedule:
    # JST 6:00 / 18:00
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      IDENTIFIER_LOOKUP_SOURCE: vesselfinder-scrape
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - run: pnpm tsx scripts/scrape.ts

      - name: Create and auto-merge PR if data changed
        run: |
          git diff --quiet data/ && echo "No changes" && exit 0
          BRANCH="data/update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/
          git commit -m "chore: update ship data $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: update ship data $(date +%Y-%m-%d)" \
            --body "Automated scrape from Yokohama port website." \
            --base main \
            --head "$BRANCH")
          # Retry merge up to 3 times (base branch may be updated by parallel deploys)
          for i in 1 2 3; do
            if gh pr merge "$PR_URL" --squash --delete-branch; then
              echo "Merged on attempt $i"
              exit 0
            fi
            echo "Merge attempt $i failed, waiting 10s..."
            sleep 10
          done
          echo "All merge attempts failed"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
