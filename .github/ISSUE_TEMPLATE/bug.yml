name: "🐛 Bug"
description: "不具合報告"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        不具合を報告してください。再現手順をできるだけ詳しく記述してください。
  - type: textarea
    id: description
    attributes:
      label: 不具合の概要
      description: 何が起きているかを簡潔に記述してください。
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 再現手順
      description: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: 期待される動作
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: ブラウザ、OS、バージョンなどを記述してください。
  - type: dropdown
    id: severity
    attributes:
      label: 重大度
      options:
        - Critical
        - High
        - Medium
        - Low
